<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع تصويت الأساطير - Sober</title>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: #1e2329; padding: 30px; border-radius: 20px; border: 2px solid #f3ba2f; }
        h1 { color: #f3ba2f; text-shadow: 2px 2px 5px black; }
        .section { margin-bottom: 40px; padding: 20px; border-bottom: 1px solid #474d57; }
        h2 { color: #0ecb81; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: #2b3139; padding: 15px; border-radius: 10px; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border: 1px solid #f3ba2f; }
        .btn { background: #f3ba2f; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .count { font-size: 20px; color: #f3ba2f; display: block; margin-top: 5px; }
        textarea { width: 100%; background: #2b3139; color: white; border: 1px solid #474d57; border-radius: 10px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sober Legends Vote 🏆</h1>

        <div class="section">
            <h2>من هو الأسطورة الحقيقي؟ ⚽</h2>
            <div class="grid">
                <div class="card">
                    <p>ميسي (Messi)</p>
                    <button class="btn" onclick="vote('messi')">صوّت للبرغوث</button>
                    <span id="messi-count" class="count">0</span>
                </div>
                <div class="card">
                    <p>رونالدو (CR7)</p>
                    <button class="btn" onclick="vote('ronaldo')">صوّت للدون</button>
                    <span id="ronaldo-count" class="count">0</span>
                </div>
            </div>
            <textarea placeholder="اكتب أسباب اختيارك هنا..."></textarea>
        </div>

        <div class="section">
            <h2>لعبتك المفضلة؟ 🎮</h2>
            <div class="grid">
                <div class="card">
                    <p>Diablo Immortal</p>
                    <button class="btn" onclick="vote('diablo')">صوّت</button>
                    <span id="diablo-count" class="count">0</span>
                </div>
                <div class="card">
                    <p>Agar.io</p>
                    <button class="btn" onclick="vote('agar')">صوّت</button>
                    <span id="agar-count" class="count">0</span>
                </div>
                <div class="card">
                    <p>Clash Royale</p>
                    <button class="btn" onclick="vote('clash')">صوّت</button>
                    <span id="clash-count" class="count">0</span>
                </div>
                <div class="card">
                    <p>High School DxD</p>
                    <button class="btn" onclick="vote('dxd')">صوّت</button>
                    <span id="dxd-count" class="count">0</span>
                </div>
            </div>
        </div>

        <button class="btn" style="padding: 20px;" onclick="alert('تم حفظ تصويتك في ذاكرة الموقع!')">تثبيت التصويت النهائي</button>
    </div>

    <script>
        function vote(id) {
            let el = document.getElementById(id + '-count');
            el.innerText = parseInt(el.innerText) + 1;
        }
    </script>
</body>
</html>
